[theme]
theme = "plain"

[theme.overrides]
idle_bg = "@@BAR_BG@@"
idle_fg = "@@BAR_FG@@"
info_bg = "@@BAR_BG@@"
info_fg = "@@BAR_FG@@"
good_bg = "@@BAR_BG@@"
good_fg = "@@COLOR_GOOD@@"
warning_bg = "@@BAR_BG@@"
warning_fg = "@@COLOR_WARNING@@"
critical_bg = "@@BAR_BG@@"
critical_fg = "@@COLOR_CRITICAL@@"
separator = ""
separator_bg = "@@BAR_BG@@"
separator_fg = "@@BAR_BG@@"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
format = " $icon $utilization "

[[block]]
block = "memory"
format = " $icon $mem_used_percents "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $available "

[[block]]
block = "net"
device = "wlan0"
format = " $icon $ssid $signal_strength "
format_alt = " $icon $ip "

[[block]]
block = "sound"
format = " $icon $volume "

[[block]]
block = "custom"
command = "printf '   %s%%' $(cat /sys/class/power_supply/BAT1/capacity 2>/dev/null || echo '?')"
interval = 30

[[block]]
block = "custom"
command = "~/.config/i3/powerprofile.sh"
interval = 5

[[block]]
block = "time"
format = "  $icon  $timestamp.datetime(f:'%a %d/%m %H:%M') "
