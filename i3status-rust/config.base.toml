[theme]
theme = "plain"

[theme.overrides]
idle_bg = "@@BAR_BG@@"
idle_fg = "@@BAR_FG@@"
info_bg = "@@BAR_BG@@"
info_fg = "@@BAR_FG@@"
good_bg = "@@BAR_BG@@"
good_fg = "@@COLOR_GOOD@@"
warning_bg = "@@BAR_BG@@"
warning_fg = "@@COLOR_WARNING@@"
critical_bg = "@@BAR_BG@@"
critical_fg = "@@COLOR_CRITICAL@@"
separator = ""
separator_bg = "@@BAR_BG@@"
separator_fg = "@@BAR_BG@@"

[icons]
icons = "awesome6"

[icons.overrides]
cpu = "\uf2db"

[[block]]
block = "cpu"
format = " $icon $utilization "

[[block]]
block = "custom"
command = "awk '/MemTotal/ {t=$2} /MemAvailable/ {a=$2} END {u=(t-a)/1048576; printf \"   %.2f/%.2f Gib (%.0f%%)  \", u, t/1048576, (t-a)/t*100}' /proc/meminfo"
interval = 10

[[block]]
block = "disk_space"
path = "/"
format = " $icon $available "

[[block]]
block = "custom"
command = "printf '{\"text\":\"│\",\"state\":\"Good\"}'"
json = true
interval = 86400

[[block]]
block = "net"
@@NET_DEVICE_LINE@@
format = " $icon  {$ssid $signal_strength|$device} "
format_alt = " $icon  $ip "
[[block.click]]
button = "left"
cmd = "kitty --class impala -e impala"

[[block]]
block = "sound"
format = " $icon  $volume "

[[block]]
block = "custom"
command = "xset q | grep -qi 'caps lock.*on' && printf ' 󰪛 ON' || printf ''"
interval = 1

[[block]]
block = "custom"
command = "printf '{\"text\":\"│\",\"state\":\"Good\"}'"
json = true
interval = 86400

[[block]]
block = "battery"
format = " $icon  $percentage "
not_charging_format = " $icon  $percentage "
interval = 30

[[block]]
block = "custom"
command = "powerprofilesctl get | sed 's/performance/ Perf/;s/balanced/ Bal/;s/power-saver/ Save/'"
interval = 5

[[block]]
block = "time"
format = "$icon  $timestamp.datetime(f:'%a %d/%m %H:%M')"
