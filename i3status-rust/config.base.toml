[theme]
theme = "plain"

[theme.overrides]
bg = "@@BAR_BG@@"
fg = "@@BAR_FG@@"
separator = ""
separator_bg = "@@BAR_BG@@"
separator_fg = "@@BAR_FG@@"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
format = " $icon $utilization "
color = "@@WIN_FOCUSED@@"

[[block]]
block = "memory"
format = " $icon $mem_used_percents "
color = "@@WIN_INACTIVE@@"

[[block]]
block = "disk_space"
format = " $icon $available "
color = "@@WIN_UNFOCUSED@@"

[[block]]
block = "net"
format = " $icon $ssid $signal_strength "
format_alt = " $icon $ip "
color = "@@WIN_URGENT@@"

[[block]]
block = "sound"
format = " $icon $volume "
color = "@@WIN_DIM@@"

[[block]]
block = "custom"
command = "printf '   %s%%' $(cat /sys/class/power_supply/BAT1/capacity 2>/dev/null || echo '?')"
interval = 30

[[block]]
block = "custom"
command = "~/.config/i3/powerprofile.sh"
interval = 5

[[block]]
block = "time"
format = "  $icon  $timestamp.datetime(f:'%a %d/%m %H:%M') "
color = "@@BAR_FG@@"