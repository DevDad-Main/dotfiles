[theme]
theme = "plain"

[theme.overrides]
idle_bg = "@@BAR_BG@@"
idle_fg = "@@BAR_FG@@"
info_bg = "@@BAR_BG@@"
info_fg = "@@BAR_FG@@"
good_bg = "@@BAR_BG@@"
good_fg = "@@COLOR_GOOD@@"
warning_bg = "@@BAR_BG@@"
warning_fg = "@@COLOR_WARNING@@"
critical_bg = "@@BAR_BG@@"
critical_fg = "@@COLOR_CRITICAL@@"
separator = ""
separator_bg = "@@BAR_BG@@"
separator_fg = "@@BAR_BG@@"

[icons]
icons = "material-nf"

[[block]]
block = "custom"
command = "printf ' 󰇄 '"
interval = 86400
[[block.click]]
button = "left"
cmd = "/home/oliverm/.local/bin/cascade-menu"

[[block]]
block = "cpu"
format = " $icon $utilization "

[[block]]
block = "memory"
format = " $icon $mem_used_percents "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $available "

[[block]]
block = "net"
@@NET_DEVICE_LINE@@
format = " $icon {$ssid $signal_strength|$device} "
format_alt = " $icon $ip "
[[block.click]]
button = "left"
cmd = "kitty --class impala -e impala"

[[block]]
block = "sound"
format = " $icon $volume "

[[block]]
block = "custom"
command = "xset q | grep -qi 'caps lock.*on' && printf '   ON ' || printf ''"
interval = 1

[[block]]
block = "custom"
command = "printf '   %s%s' $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 || echo '?') $(grep -q Charging /sys/class/power_supply/AC*/uevent 2>/dev/null && echo ' ' || echo '  ')"
interval = 30

[[block]]
block = "custom"
command = "~/.config/i3/powerprofile.sh"
interval = 5

[[block]]
block = "time"
format = "  $icon  $timestamp.datetime(f:'%a %d/%m %H:%M') "
