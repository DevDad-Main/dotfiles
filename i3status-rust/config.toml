[theme]
theme = "gruvbox-dark"

[theme.overrides]
separator = ""
separator_bg = "#1c1f20"
separator_fg = "#1c1f20"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
format = " $icon $utilization "

[[block]]
block = "memory"
format = " $icon $mem_used_percents "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $available "

[[block]]
block = "net"
device = "wlan0"
format = " $icon $ssid $signal_strength "
format_alt = " $icon $ip "

[[block]]
block = "sound"
format = " $icon $volume "

[[block]]
block = "custom"
command = "printf '   %s%%' $(cat /sys/class/power_supply/BAT1/capacity 2>/dev/null || echo '?')"
interval = 30

[[block]]
block = "custom"
command = "~/.config/i3/powerprofile.sh"
interval = 5

[[block]]
block = "time"
format = "  $icon  $timestamp.datetime(f:'%a %d/%m %H:%M') "
