[theme]
theme = "gruvbox-dark"

[theme.overrides]
separator = ""
separator_bg = "#282828"
separator_fg = "#282828"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
format = " $icon $utilization "

[[block]]
block = "memory"
format = " $icon $mem_used_percents "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $available "

[[block]]
block = "net"
device = "wlan0"
format = " $icon $ssid $signal_strength "
format_alt = " $icon $ip "

[[block]]
block = "sound"
format = " $icon $volume "

[[block]]
block = "battery"
format = " $icon $percentage "

[[block]]
block = "time"
format = "  $icon  $timestamp.datetime(f:'%a %d/%m %H:%M') "
