[theme]
theme = "gruvbox-dark"

[theme.overrides]
background = "#282828"
foreground = "#ebdbb2"
separator = "#504945"

[theme.overrides.good]
fg = "#98971a"

[theme.overrides.warning]
fg = "#d79921"

[theme.overrides.critical]
fg = "#cc241d"

[[block]]
block = "cpu"
format = " $icon $load "
icons_format = "{icon}"

[[block]]
block = "memory"
format = " $icon $mem_used_perc "
format_alt = " $icon $mem_used / $mem_total $swap_used "
icons_format = "{icon}"

[[block]]
block = "disk_space"
path = "/"
alias = "/"
format = " $icon $available "
icons_format = "{icon}"

[[block]]
block = "net"
device = "wlan0"
format = " $icon $ssid $signal "
format_alt = " $icon $ip "
icons_format = "{icon}"

[[block]]
block = "sound"
format = " $icon $volume "
icons_format = "{icon}"

[[block]]
block = "battery"
format = " $icon $percentage $time "
icons_format = "{icon}"

[[block]]
block = "time"
format = " $icon $timestamp.datetime(f:'%a %d/%m %H:%M', locale:'en') "
icons_format = "{icon}"
