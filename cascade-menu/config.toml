# cascade-menu configuration
#
# Appearance:   theme colors, fonts, opacity
# Behavior:     focus behavior, editor command
# Position:     where the menu opens on screen
# Keybindings:  custom keyboard shortcuts (GDK key names)

[appearance]
theme = "gruvbox-dark"
nerd_font_icons = true
show_footer = true
wrap_navigation = true
max_menu_height = 50
opacity = 1.0
border_style = "sharp"

[behavior]
close_on_focus_lost = true
restore_parent_selection = true
# Editor to open config files ($EDITOR in menu commands)
# Detected from $VISUAL/$EDITOR env, or auto
# editor_cmd = ["emacs", "--no-wait"]

[position]
anchor = "top-left"
offset_x = 8
offset_y = 0
bar_height = 20

[logging]
log_level = "warn"

[keybindings]
# Each key name maps to a GDK KEY_ constant (e.g. "Escape" -> Gdk.KEY_Escape)
# close    = ["Escape", "q"]
# up       = ["k", "Up"]
# down     = ["j", "Down"]
# back     = ["h", "Left"]
# forward  = ["l", "Right"]
# execute  = ["Return", "KP_Enter"]
# first    = ["g"]
# last     = ["G"]
# search   = ["slash"]
