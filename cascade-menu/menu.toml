[[menu.children]]
label = "Email"
icon = "\uf0e0"
command = ["thunderbird"]

[[menu]]
label = "Development"
icon = "\uf121"

[[menu.children]]
label = "Editors"

[[menu.children.children]]
label = "Emacs"
icon = "\ue632"
command = ["emacs"]

[[menu.children.children]]
label = "Neovim"
icon = "\ue6ae"
command = ["kitty", "-e", "nvim"]

[[menu.children.children]]
label = "VSCode"
icon = "\ue8da"
