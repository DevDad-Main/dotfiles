[[menu.children.children]]
label = "Alacritty"
icon = "\uf120"
command = ["alacritty"]

[[menu.children]]
label = "Git"
icon = "\uf1d3"

[[menu.children.children]]
label = "Lazygit"
icon = "\ue702"
command = ["kitty", "-e", "lazygit"]

[[menu.children.children]]
label = "Git status"
command = ["kitty", "-e", "bash", "-lc", "git status; read"]

[[menu.children.children]]
label = "Recent repos"
command = ["kitty", "-e", "bash", "-lc", "cd ~/dev && ls -d */ && read"]

[[menu.children.children]]
label = "Clone repository"
command = ["kitty", "-e", "bash", "-lc", "read -p 'URL: ' url && git clone \"$url\""]

[[menu.children]]
label = "Containers"
icon = "\uf21f"

[[menu.children.children]]
label = "Docker ps"
command = ["kitty", "-e", "docker", "ps"]

[[menu.children.children]]
label = "Docker compose up"
command = ["kitty", "-e", "docker", "compose", "up"]

[[menu.children.children]]
label = "Docker compose down"
command = ["kitty", "-e", "docker", "compose", "down"]

[[menu.children]]
label = "Databases"
icon = "\uf1c0"

[[menu.children.children]]
label = "SQLite browser"
command = ["kitty", "-e", "sqlitebrowser"]

[[menu.children.children]]
label = "PGAdmin"
command = ["kitty", "-e", "pgadmin4"]

[[menu]]
label = "System"
icon = "\uf013"

[[menu.children]]
label = "Audio"
icon = "\uf028"

[[menu.children.children]]
label = "Volume up"
icon = "\uf028"
keep_open = true
command = ["pactl", "set-sink-volume", "@DEFAULT_SINK@", "+5%"]

[[menu.children.children]]
label = "Volume down"
icon = "\uf027"
keep_open = true
command = ["pactl", "set-sink-volume", "@DEFAULT_SINK@", "-5%"]

[[menu.children.children]]
label = "Toggle mute"
icon = "\uf026"
keep_open = true
command = ["pactl", "set-sink-mute", "@DEFAULT_SINK@", "toggle"]

[[menu.children]]
label = "Brightness"
icon = "\uf185"

[[menu.children.children]]
label = "Brightness up"
keep_open = true
command = ["brightnessctl", "set", "+5%"]

[[menu.children.children]]
label = "Brightness down"
keep_open = true
command = ["brightnessctl", "set", "5%-"]

[[menu.children]]
label = "Power"
icon = "\uf011"

[[menu.children.children]]
label = "Lock"
icon = "\uf023"
command = ["i3lock"]

[[menu.children.children]]
label = "Suspend"
icon = "\uf186"
command = ["systemctl", "suspend"]

[[menu.children.children]]
label = "Hibernate"
icon = "\uf186"
command = ["systemctl", "hibernate"]

[[menu.children.children]]
label = "Reboot"
icon = "\uf021"
command = ["systemctl", "reboot"]

[[menu.children.children]]
label = "Shutdown"
icon = "\uf011"
command = ["systemctl", "poweroff"]

[[menu.children]]
label = "Network"
icon = "\uf1eb"

[[menu.children.children]]
label = "Impala"
command = ["kitty", "-e", "impala"]

[[menu.children.children]]
label = "Bluetooth"
command = ["kitty", "-e", "bluetui"]

[[menu]]
label = "Info & Tools"
icon = "\uf129"

[[menu.children]]
label = "System monitor"
icon = "\uf080"
command = ["kitty", "-e", "btop"]

[[menu.children]]
label = "Process list"
icon = "\uf080"
command = ["kitty", "-e", "htop"]

[[menu.children]]
label = "Disk usage"
icon = "\uf07b"
command = ["kitty", "-e", "ncdu"]

[[menu.children]]
label = "Network info"
command = ["kitty", "-e", "nmtui"]

[[menu.children]]
label = "Screenshot"
icon = "\uf030"

[[menu.children.children]]
label = "Full screen"
command = ["maim", "~/Pictures/screenshots/$(date +%s).png"]

[[menu.children.children]]
label = "Select area"
command = ["maim", "-s", "~/Pictures/screenshots/$(date +%s).png"]

[[menu.children.children]]
label = "Copy to clipboard"
shell = true
command = ["maim -s | xclip -selection clipboard -t image/png"]

[[menu]]
label = "Windows"
icon = "\uf2d0"

[[menu.children]]
label = "Floating toggle"
command = ["i3-msg", "floating", "toggle"]

[[menu.children]]
label = "Fullscreen"
command = ["i3-msg", "fullscreen", "toggle"]

[[menu.children]]
label = "Scratchpad"
command = ["i3-msg", "scratchpad", "show"]

[[menu.children]]
label = "Move to scratchpad"
command = ["i3-msg", "move", "scratchpad"]

[[menu.children]]
label = "Layout stacking"
command = ["i3-msg", "layout", "stacking"]

[[menu.children]]
label = "Layout tabbed"
command = ["i3-msg", "layout", "tabbed"]

[[menu.children]]
label = "Layout split"
command = ["i3-msg", "layout", "toggle", "split"]

