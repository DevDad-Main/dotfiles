[[menu]]
label = "System"
icon = "\U000f0314"

[[menu.children]]
label = "Audio"
icon = "\U000f04e2"

[[menu.children.children]]
label = "Volume up"
icon = "\U000f04e7"
command = ["pactl", "set-sink-volume", "@DEFAULT_SINK@", "+5%"]

[[menu.children.children]]
label = "Volume down"
icon = "\U000f04e9"
