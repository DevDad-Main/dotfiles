# NetworkManager wifi backend -> iwd
# Required for impala (a TUI for iwd) to manage your wireless connections.
# Deploy to: /etc/NetworkManager/conf.d/wifi_backend.conf  (root-owned)
#
#   sudo install -Dm644 ~/.config/dotfiles/network/wifi_backend-iwd.conf \
#     /etc/NetworkManager/conf.d/wifi_backend.conf
#   sudo systemctl restart NetworkManager
#
# NetworkManager keeps managing your saved connections; it just drives iwd
# under the hood instead of wpa_supplicant. impala talks to iwd directly.
# Revert by deleting that file and restarting NetworkManager.
[device]
wifi.backend=iwd
